<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --primary: #DE7356;
        --primary-dark: #c45e41;
        --primary-light: #f2a98e;
        --text: #1a1a1a;
        --text-muted: #6b7280;
        --border: #e5e7eb;
        --bg: #f9fafb;
        --surface: #ffffff;
        --error: #dc2626;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }

      .card {
        background: var(--surface);
        border-radius: 12px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        padding: 2.5rem 2rem;
        width: 100%;
        max-width: 400px;
      }

      .logo {
        width: 44px;
        height: 44px;
        border-radius: 10px;
        background: var(--primary);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 1.5rem;
      }

      .logo svg {
        width: 24px;
        height: 24px;
        fill: #fff;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 0.375rem;
        color: var(--text);
      }

      .subtitle {
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-bottom: 2rem;
      }

      .field {
        margin-bottom: 1.25rem;
      }

      label {
        display: block;
        font-size: 0.875rem;
        font-weight: 500;
        margin-bottom: 0.375rem;
        color: var(--text);
      }

      input[type="text"],
      input[type="email"],
      input[type="password"] {
        width: 100%;
        padding: 0.625rem 0.875rem;
        border: 1.5px solid var(--border);
        border-radius: 8px;
        font-size: 0.9375rem;
        color: var(--text);
        background: var(--surface);
        transition: border-color 0.15s, box-shadow 0.15s;
        outline: none;
      }

      input[type="text"]:focus,
      input[type="email"]:focus,
      input[type="password"]:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(222, 115, 86, 0.15);
      }

      .field-error {
        font-size: 0.8125rem;
        color: var(--error);
        margin-top: 0.375rem;
        display: none;
      }

      .field.invalid input {
        border-color: var(--error);
      }

      .field.invalid .field-error {
        display: block;
      }

      .message {
        margin-top: 1rem;
        padding: 0.75rem;
        border-radius: 8px;
        font-size: 0.875rem;
        text-align: center;
      }

      .message.success {
        background-color: #d1fae5;
        color: #065f46;
        border: 1px solid #a7f3d0;
      }

      .message.error {
        background-color: #fee2e2;
        color: #991b1b;
        border: 1px solid #fca5a5;
      }

      .name-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
      }

      button[type="submit"] {
        width: 100%;
        padding: 0.75rem;
        background: var(--primary);
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 0.9375rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s, transform 0.1s;
        margin-top: 0.25rem;
      }

      button[type="submit"]:hover {
        background: var(--primary-dark);
      }

      button[type="submit"]:active {
        transform: scale(0.98);
      }

      .terms {
        font-size: 0.8125rem;
        color: var(--text-muted);
        margin-top: 1rem;
        text-align: center;
        line-height: 1.5;
      }

      .terms a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 500;
      }

      .terms a:hover {
        color: var(--primary-dark);
        text-decoration: underline;
      }

      .divider {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin: 1.5rem 0;
        color: var(--text-muted);
        font-size: 0.8125rem;
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      .signin {
        text-align: center;
        font-size: 0.875rem;
        color: var(--text-muted);
      }

      .signin a {
        color: var(--primary);
        font-weight: 500;
        text-decoration: none;
      }

      .signin a:hover {
        color: var(--primary-dark);
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2a5 5 0 1 1 0 10A5 5 0 0 1 12 2zm0 12c5.33 0 8 2.67 8 4v2H4v-2c0-1.33 2.67-4 8-4z"/>
        </svg>
      </div>

      <h1>Create an account</h1>
      <p class="subtitle">Get started — it only takes a minute</p>

      <form id="signup-form" novalidate>
        <div class="name-row">
          <div class="field" id="field-firstname">
            <label for="firstname">First name</label>
            <input
              type="text"
              id="firstname"
              name="firstname"
              placeholder="Jane"
              autocomplete="given-name"
              required
            />
            <span class="field-error" id="error-firstname">Required.</span>
          </div>

          <div class="field" id="field-lastname">
            <label for="lastname">Last name</label>
            <input
              type="text"
              id="lastname"
              name="lastname"
              placeholder="Doe"
              autocomplete="family-name"
              required
            />
            <span class="field-error" id="error-lastname">Required.</span>
          </div>
        </div>

        <div class="field" id="field-email">
          <label for="email">Email address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
          <span class="field-error" id="error-email">Please enter a valid email address.</span>
        </div>

        <div class="field" id="field-password">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Min. 8 characters"
            autocomplete="new-password"
            required
          />
          <span class="field-error" id="error-password">Password must be at least 8 characters.</span>
        </div>

        <div class="field" id="field-confirm">
          <label for="confirm">Confirm password</label>
          <input
            type="password"
            id="confirm"
            name="confirm"
            placeholder="••••••••"
            autocomplete="new-password"
            required
          />
          <span class="field-error" id="error-confirm">Passwords do not match.</span>
        </div>

        <button type="submit" id="submit-btn">Create account</button>
      </form>

      <div id="message" class="message" style="display: none;"></div>

      <p class="terms">
        By creating an account you agree to our
        <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
      </p>

      <div class="divider">or</div>

      <p class="signin">Already have an account? <a href="/o/authenticate">Sign in</a></p>
    </div>

    <script>
      const form = document.getElementById("signup-form");

      const validators = {
        firstname: (v) => v.trim().length > 0,
        lastname:  (v) => v.trim().length > 0,
        email:     (v) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v),
        password:  (v) => v.length >= 8,
        confirm:   (v) => v === document.getElementById("password").value,
      };

      function validate(id) {
        const input = document.getElementById(id);
        const field = document.getElementById("field-" + id);
        const ok = validators[id](input.value);
        field.classList.toggle("invalid", !ok);
        return ok;
      }

      Object.keys(validators).forEach((id) => {
        document.getElementById(id).addEventListener("input", () => validate(id));
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const allValid = Object.keys(validators).map(validate).every(Boolean);
        if (!allValid) return;

        const submitBtn = document.getElementById("submit-btn");
        const messageDiv = document.getElementById("message");

        submitBtn.disabled = true;
        submitBtn.textContent = "Creating account...";

        messageDiv.style.display = "none";
        messageDiv.className = "message";

        const formData = new FormData(form);
        const data = {
          firstName: formData.get('firstname'),
          lastName: formData.get('lastname'),
          email: formData.get('email'),
          password: formData.get('password')
        };

        try {
          const response = await fetch('/o/signup', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
          });

          if (response.ok) {
            const result = await response.json();
            messageDiv.textContent = "User created successfully! You can now sign in.";
            messageDiv.classList.add("success");
            messageDiv.style.display = "block";
            form.reset();
          } else {
            const error = await response.json();
            messageDiv.textContent = "Error: " + error.message;
            messageDiv.classList.add("error");
            messageDiv.style.display = "block";
          }
        } catch (error) {
          messageDiv.textContent = "Network error: " + error.message;
          messageDiv.classList.add("error");
          messageDiv.style.display = "block";
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = "Create account";
        }
      });
    </script>
  </body>
</html>
