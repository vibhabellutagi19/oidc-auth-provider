<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register Client Application</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --primary: #de7356;
        --primary-dark: #c45e41;
        --primary-light: #f2a98e;
        --text: #1a1a1a;
        --text-muted: #6b7280;
        --border: #e5e7eb;
        --bg: #f9fafb;
        --surface: #ffffff;
        --error: #dc2626;
        --success: #059669;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }

      .card {
        background: var(--surface);
        border-radius: 12px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        padding: 2.5rem 2rem;
        width: 100%;
        max-width: 500px;
      }

      .logo {
        width: 44px;
        height: 44px;
        border-radius: 10px;
        background: var(--primary);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 1.5rem;
      }

      .logo svg {
        width: 24px;
        height: 24px;
        fill: #fff;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 0.375rem;
        color: var(--text);
      }

      .subtitle {
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-bottom: 2rem;
      }

      .field {
        margin-bottom: 1.25rem;
      }

      label {
        display: block;
        font-size: 0.875rem;
        font-weight: 500;
        margin-bottom: 0.375rem;
        color: var(--text);
      }

      input[type="text"],
      input[type="url"] {
        width: 100%;
        padding: 0.625rem 0.875rem;
        border: 1.5px solid var(--border);
        border-radius: 8px;
        font-size: 0.9375rem;
        color: var(--text);
        background: var(--surface);
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
        outline: none;
      }

      input[type="text"]:focus,
      input[type="url"]:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(222, 115, 86, 0.15);
      }

      .field-error {
        font-size: 0.8125rem;
        color: var(--error);
        margin-top: 0.375rem;
        display: none;
      }

      .field.invalid input {
        border-color: var(--error);
      }

      .field.invalid .field-error {
        display: block;
      }

      .message {
        margin-top: 1rem;
        padding: 0.75rem;
        border-radius: 8px;
        font-size: 0.875rem;
        text-align: center;
      }

      .message.success {
        background-color: #d1fae5;
        color: #065f46;
        border: 1px solid #a7f3d0;
      }

      .message.error {
        background-color: #fee2e2;
        color: #991b1b;
        border: 1px solid #fca5a5;
      }

      button[type="submit"] {
        width: 100%;
        padding: 0.75rem;
        background: var(--primary);
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 0.9375rem;
        font-weight: 600;
        cursor: pointer;
        transition:
          background 0.15s,
          transform 0.1s;
        margin-top: 0.25rem;
      }

      button[type="submit"]:hover {
        background: var(--primary-dark);
      }

      button[type="submit"]:active {
        transform: scale(0.98);
      }

      button[type="submit"]:disabled {
        background: var(--text-muted);
        cursor: not-allowed;
        transform: none;
      }

      .back-link {
        text-align: center;
        margin-top: 1.5rem;
      }

      .back-link a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 500;
      }

      .back-link a:hover {
        color: var(--primary-dark);
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M12 2a5 5 0 1 1 0 10A5 5 0 0 1 12 2zm0 12c5.33 0 8 2.67 8 4v2H4v-2c0-1.33 2.67-4 8-4z"
          />
        </svg>
      </div>

      <h1>Register Client Application</h1>
      <p class="subtitle">Add a new OAuth/OIDC client application</p>

      <form id="client-form" novalidate>
        <div class="field" id="field-name">
          <label for="name">Application Display Name</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="My Awesome App"
            autocomplete="off"
            required
          />
          <span class="field-error" id="error-name"
            >Application name is required.</span
          >
        </div>

        <div class="field" id="field-url">
          <label for="url">Application URL</label>
          <input
            type="url"
            id="url"
            name="url"
            placeholder="https://myapp.com"
            autocomplete="off"
            required
          />
          <span class="field-error" id="error-url"
            >Please enter a valid URL.</span
          >
        </div>

        <div class="field" id="field-redirect">
          <label for="redirect">Redirect URI</label>
          <input
            type="url"
            id="redirect"
            name="redirect"
            placeholder="https://myapp.com/callback"
            autocomplete="off"
            required
          />
          <span class="field-error" id="error-redirect"
            >Please enter a valid redirect URI.</span
          >
        </div>

        <button type="submit" id="submit-btn">Register Application</button>
      </form>

      <div id="message" class="message" style="display: none"></div>

      <div class="back-link">
        <a href="/o/authorize">← Back to Authentication</a>
      </div>
    </div>

    <script>
      const form = document.getElementById("client-form");

      const validators = {
        name: (v) => v.trim().length > 0,
        url: (v) => {
          try {
            new URL(v);
            return true;
          } catch {
            return false;
          }
        },
        redirect: (v) => {
          try {
            new URL(v);
            return true;
          } catch {
            return false;
          }
        },
      };

      function validate(id) {
        const input = document.getElementById(id);
        const field = document.getElementById("field-" + id);
        const ok = validators[id](input.value);
        field.classList.toggle("invalid", !ok);
        return ok;
      }

      Object.keys(validators).forEach((id) => {
        document
          .getElementById(id)
          .addEventListener("input", () => validate(id));
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const allValid = Object.keys(validators).map(validate).every(Boolean);
        if (!allValid) return;

        const submitBtn = document.getElementById("submit-btn");
        const messageDiv = document.getElementById("message");

        submitBtn.disabled = true;
        submitBtn.textContent = "Registering...";

        messageDiv.style.display = "none";
        messageDiv.className = "message";

        const formData = new FormData(form);
        const data = {
          name: formData.get("name"),
          url: formData.get("url"),
          redirectUri: formData.get("redirect"),
        };

        try {
          const response = await fetch("/o/clients", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(data),
          });

          if (response.ok) {
            const result = await response.json();
            messageDiv.textContent =
              "Client application registered successfully! Client ID: " +
              result.data.clientId;
            messageDiv.classList.add("success");
            messageDiv.style.display = "block";
            form.reset();
          } else {
            const error = await response.json();
            messageDiv.textContent = "Error: " + error.message;
            messageDiv.classList.add("error");
            messageDiv.style.display = "block";
          }
        } catch (error) {
          messageDiv.textContent = "Network error: " + error.message;
          messageDiv.classList.add("error");
          messageDiv.style.display = "block";
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = "Register Application";
        }
      });
    </script>
  </body>
</html>
