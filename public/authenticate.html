<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --primary: #de7356;
        --primary-dark: #c45e41;
        --primary-light: #f2a98e;
        --text: #1a1a1a;
        --text-muted: #6b7280;
        --border: #e5e7eb;
        --bg: #f9fafb;
        --surface: #ffffff;
        --error: #dc2626;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }

      .card {
        background: var(--surface);
        border-radius: 12px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        padding: 2.5rem 2rem;
        width: 100%;
        max-width: 400px;
      }

      .logo {
        width: 44px;
        height: 44px;
        border-radius: 10px;
        background: var(--primary);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 1.5rem;
      }

      .logo svg {
        width: 24px;
        height: 24px;
        fill: #fff;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 0.375rem;
        color: var(--text);
      }

      .subtitle {
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-bottom: 2rem;
      }

      .field {
        margin-bottom: 1.25rem;
      }

      label {
        display: block;
        font-size: 0.875rem;
        font-weight: 500;
        margin-bottom: 0.375rem;
        color: var(--text);
      }

      input[type="email"],
      input[type="password"] {
        width: 100%;
        padding: 0.625rem 0.875rem;
        border: 1.5px solid var(--border);
        border-radius: 8px;
        font-size: 0.9375rem;
        color: var(--text);
        background: var(--surface);
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
        outline: none;
      }

      input[type="email"]:focus,
      input[type="password"]:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(222, 115, 86, 0.15);
      }

      .field-error {
        font-size: 0.8125rem;
        color: var(--error);
        margin-top: 0.375rem;
        display: none;
      }

      .field.invalid input {
        border-color: var(--error);
      }

      .field.invalid .field-error {
        display: block;
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1.5rem;
      }

      .remember {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.875rem;
        color: var(--text-muted);
        cursor: pointer;
      }

      .remember input[type="checkbox"] {
        accent-color: var(--primary);
        width: 15px;
        height: 15px;
        cursor: pointer;
      }

      .forgot {
        font-size: 0.875rem;
        color: var(--primary);
        text-decoration: none;
        font-weight: 500;
      }

      .forgot:hover {
        color: var(--primary-dark);
        text-decoration: underline;
      }

      button[type="submit"] {
        width: 100%;
        padding: 0.75rem;
        background: var(--primary);
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 0.9375rem;
        font-weight: 600;
        cursor: pointer;
        transition:
          background 0.15s,
          transform 0.1s;
      }

      button[type="submit"]:hover {
        background: var(--primary-dark);
      }

      button[type="submit"]:active {
        transform: scale(0.98);
      }

      .divider {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin: 1.5rem 0;
        color: var(--text-muted);
        font-size: 0.8125rem;
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      .signup {
        text-align: center;
        font-size: 0.875rem;
        color: var(--text-muted);
      }

      .signup a {
        color: var(--primary);
        font-weight: 500;
        text-decoration: none;
      }

      .signup a:hover {
        color: var(--primary-dark);
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M12 2a5 5 0 1 1 0 10A5 5 0 0 1 12 2zm0 12c5.33 0 8 2.67 8 4v2H4v-2c0-1.33 2.67-4 8-4z"
          />
        </svg>
      </div>

      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to your account to continue</p>

      <form id="signin-form" novalidate>
        <div class="field" id="field-email">
          <label for="email">Email address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
          <span class="field-error" id="error-email"
            >Please enter a valid email address.</span
          >
        </div>

        <div class="field" id="field-password">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
          <span class="field-error" id="error-password"
            >Password is required.</span
          >
        </div>

        <div class="row">
          <label class="remember">
            <input type="checkbox" name="remember" />
            Remember me
          </label>
          <a href="#" class="forgot">Forgot password?</a>
        </div>

        <button type="submit">Sign in</button>
      </form>

      <div class="divider">or</div>

      <p class="signup">
        Don't have an account? <a href="/o/signup">Create one</a>
      </p>
    </div>

    <script>
      const form = document.getElementById("signin-form");

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        let valid = true;

        const email = document.getElementById("email");
        const emailField = document.getElementById("field-email");
        if (!email.value || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value)) {
          emailField.classList.add("invalid");
          valid = false;
        } else {
          emailField.classList.remove("invalid");
        }

        const password = document.getElementById("password");
        const passwordField = document.getElementById("field-password");
        if (!password.value) {
          passwordField.classList.add("invalid");
          valid = false;
        } else {
          passwordField.classList.remove("invalid");
        }

        if (valid) {
          form.submit();
        }
      });

      ["email", "password"].forEach((id) => {
        document.getElementById(id).addEventListener("input", () => {
          document.getElementById("field-" + id).classList.remove("invalid");
        });
      });
    </script>
  </body>
</html>
